name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # 每天早上 8 點 UTC 執行完整測試
    - cron: '0 0 * * *'
  workflow_dispatch:  # 允許手動觸發

env:
  PYTHON_VERSION: '3.10'

jobs:
  # L1: 快速檢查
  l1-check:
    name: L1 - 語法檢查
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v3
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: 📦 Install dependencies
        run: |
          pip install pandas numpy plotly streamlit yfinance
      
      - name: 🔍 Run L1 tests
        run: |
          python tests/test_l1_syntax.py
      
      - name: ✅ L1 passed
        run: echo "L1 檢查通過"

  # L2: 整合測試
  l2-test:
    name: L2 - 整合測試
    runs-on: ubuntu-latest
    needs: l1-check
    timeout-minutes: 5
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v3
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: 📦 Install dependencies
        run: |
          pip install pandas numpy plotly streamlit yfinance
      
      - name: 🧪 Run L2 tests
        run: |
          timeout 60 python tests/test_l2_integration.py || {
            echo "L2 測試超時或失敗"
            exit 1
          }
      
      - name: ✅ L2 passed
        run: echo "L2 測試通過"

  # 部署檢查
  deploy-check:
    name: 部署檢查
    runs-on: ubuntu-latest
    needs: l2-test
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: 🚀 部署準備
        run: echo "準備部署..."
      
      # 這裡可以添加實際的部署步驟
      # 例如：推送到伺服器、重啟服務等
